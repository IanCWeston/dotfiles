set-option -g default-terminal 'tmux-256color'
set-option -sa terminal-overrides ',xterm*:Tc,xterm*:RGB'

set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Status on top
set -g status-position top


# Theme config
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style fsquare
set -g @tokyo-night-tmux_date_format hide
set -g @tokyo-night-tmux_time_format 12H
set -g @tokyo-night-tmux_window_tidy_icons 0

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin "janoamaral/tokyo-night-tmux"

run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
set-window-option -g mode-keys vi

# don't exit from session when closing last window
set -g detach-on-destroy off

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key x kill-pane

# Sesh
bind-key "T" display-popup -E -w 85% -h 60% "sesh connect \"$( \
  sesh list --icons | fzf \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
    --header '  ^a all   ^t tmux   ^g configs   ^x zoxide   ^d kill   ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️ )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁 )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎 )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡ )+reload(sesh list --icons)' \
    --preview-window 'right:45%' \
    --preview 'sesh preview {}' \
)\""

bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf # Reload tmux config file

unbind '"'
unbind '%'
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
